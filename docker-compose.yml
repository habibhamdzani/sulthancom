services:
  mongodb:
    image: mongo:7
    container_name: sulthancom-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
    networks:
      - sulthancom-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sulthancom-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sulthancom-network
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sulthancom-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - MONGO_URI=mongodb://admin:admin123@mongodb:27017
      - MONGO_DB=sulthancom_pos
      - REDIS_ADDR=redis:6379
      - JWT_SECRET=sulthancom-secret-key-change-in-production
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sulthancom-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - PUBLIC_API_URL=http://backend:8080/api
    container_name: sulthancom-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - PUBLIC_API_URL=http://localhost:8080/api
    depends_on:
      - backend
    networks:
      - sulthancom-network

volumes:
  mongodb_data:
  redis_data:

networks:
  sulthancom-network:
    driver: bridge
